<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Before front gate condition</title>
  <desc id="desc">A bent front gate with uneven fence sections and poor curb appeal.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbd9d6" />
      <stop offset="100%" stop-color="#ede7df" />
    </linearGradient>
    <linearGradient id="street" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#949ea3" />
      <stop offset="100%" stop-color="#6d7479" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#sky)" />
  <rect y="620" width="1200" height="280" fill="url(#street)" />
  <rect x="80" y="300" width="1040" height="350" fill="#8f8f89" stroke="#585754" stroke-width="6" />
  <g fill="#a19f98" stroke="#67655f" stroke-width="3">
    <rect x="105" y="335" width="50" height="300" />
    <rect x="175" y="350" width="50" height="290" />
    <rect x="245" y="335" width="50" height="305" />
    <rect x="315" y="345" width="50" height="295" />
    <rect x="385" y="355" width="50" height="285" />
    <rect x="455" y="330" width="50" height="310" />
  </g>

  <g transform="translate(560 320) rotate(6)">
