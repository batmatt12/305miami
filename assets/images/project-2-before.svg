  </g>
  <rect x="0" y="0" width="1200" height="900" fill="#1f2528" opacity="0.11" />
  <text x="78" y="118" font-size="86" font-family="Arial, sans-serif" font-weight="700" fill="#2d3538" opacity="0.8">BEFORE</text>
