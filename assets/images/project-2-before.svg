    <line x1="0" y1="0" x2="280" y2="325" stroke="#5a5955" stroke-width="8" />
    <line x1="280" y1="0" x2="0" y2="325" stroke="#5a5955" stroke-width="8" />
  </g>

  <g fill="#a7a58f" stroke="#67655f" stroke-width="3">
    <rect x="860" y="335" width="50" height="300" />
    <rect x="930" y="355" width="50" height="285" />
    <rect x="1000" y="340" width="50" height="300" />
  </g>

  <g fill="#7f8d70">
